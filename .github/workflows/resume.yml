name: Build Resume PDF

on:
  push:
    paths:
      - '**.tex'
  workflow_dispatch:        

permissions:
  contents: write           

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: Bat-Orgil_Erdenabat_Resume.tex      

      - name: Commit the PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-build resume PDF"
          file_pattern: "*.pdf"
